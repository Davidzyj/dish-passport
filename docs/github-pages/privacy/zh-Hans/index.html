      <h1>隐私政策</h1>
      <p class="meta">生效日期：2026 年 6 月 13 日</p>
      <p>味游中国是一款本地优先的 iPhone App。App 不需要账号，不包含广告，不使用分析 SDK，也不会追踪用户。</p>
      <h2>数据收集</h2>
      <p>App 不收集个人数据。收藏菜品、喜欢菜品、想尝试清单、最近浏览和语言偏好都只保存在你的设备本地。</p>
      <h2>网络访问</h2>
      <p>App 不会主动向服务器发送数据。隐私政策和支持链接只有在你点击时才会通过浏览器打开。</p>
      <h2>第三方</h2>
      <p>App 不会向第三方共享数据，也不使用第三方追踪。</p>
      <h2>联系我们</h2>
      <p>如有隐私问题，请发送邮件至 <a href="mailto:jay212315@gmail.com">jay212315@gmail.com</a>。</p>
